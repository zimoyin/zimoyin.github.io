# Site settings
title: 子墨博客
SEOTitle: 子墨茵 | 博客
header-img: img/top.png
email: tianxuanzimo@qq.com
description: "这是子墨的一个博客，用来放平时学的笔记。如果这些笔记能帮到您的话，那我就很开心"
keyword: "BY, BY Blog, 子墨的博客, zimo,zimoyin, 子墨, java, python, termux,子墨茵"
url: "http://zimoyin.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
github_repo: "https://github.com/zimoyin/zimoyin.github.io.git" # you code repository "https://github.com/qiubaiying/qiubaiying.github.io.git"

# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "Goals determine what you going to be!"
sidebar-avatar: http://q1.qlogo.cn/g?b=qq&nk=2556608754&s=640      # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
RSS: false
# weibo_username:     
zhihu_username:     
github_username:    zimoyin
facebook_username:  
jianshu_username:   
#twitter_username:   qiubaiying




# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`



# Gems
# from PR#40, to support local preview for Jekyll 3.0
gems: [jekyll-paginate]




# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM                            # use Github Flavored Markdown !important



# 评论系统
# Disqus（https://disqus.com/）
# disqus_username: qiubaiying

# Gitalk
gitalk:
  enable: true    #是否开启Gitalk评论
  clientID: 952f0bedd8ff110f583c                            #生成的clientID
  clientSecret: 140be1d239d9ac186c01f9a2352259fab03b958c    #生成的clientSecret
  repo: zimoyin.github.io    #仓库名称
  owner: zimoyin    #github用户名
  admin: zimoyin
  distractionFreeMode: true #是否启用类似FB的阴影遮罩


# 统计

# Analytics settings
# Baidu Analytics
ba_track_id: b71fcea13c5e5395fd6d89ed71a75673

# Google Analytics
# ga_track_id: 'UA-90855596-1'            # Format: UA-xxxxxx-xx
# ga_domain: qiubaiying.top               # 默认的是 auto, 这里我是自定义了的域名，你如果没有自己的域名，需要改成auto





# Featured Tags
featured-tags: true                     # 是否使用首页标签
featured-condition-size: 1              # 相同标签数量大于这个数，才会出现在首页



# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true



